name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TERMUX_PACKAGE_VARIANT: apt-android-7
      TERMUX_SPLIT_APKS_FOR_DEBUG_BUILDS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_log.txt

      - name: Extract errors
        if: failure()
        run: |
          python3 - <<'PY'
          import re
          try:
              with open("build_log.txt", "r", encoding="utf-8", errors="ignore") as f:
                  lines = f.readlines()
          except FileNotFoundError:
              lines = []
          key = []
          seen = set()
          for line in lines:
              s = line.rstrip("\n")
              if (s.startswith("e: ") or s.startswith("> ") or "error:" in s.lower()
                      or "FAILURE:" in s or "What went wrong" in s or "Caused by:" in s
                      or "Exception" in s or "Unresolved reference" in s
                      or re.search(r"\.(kt|java|xml):\d+", s) or ("Task" in s and "FAILED" in s)):
                  if s not in seen:
                      seen.add(s)
                      key.append(s)
          with open("error.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(key) if key else "".join(lines[-200:]))
          for s in key[:40]:
              flat = s.replace("%", "%25").replace("\r", "").replace("\n", " ")
              print(f"::error::{flat}")
          print("error.txt written with", len(key), "key lines")
          PY

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TermNX-debug
          path: app/build/outputs/apk/debug/*.apk
